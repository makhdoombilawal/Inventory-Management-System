# Application Configuration for Testing (No Redis Required)
# Use this profile when Redis is not available
# Run with: mvn spring-boot:run -Dspring-boot.run.profiles=test

spring:
  application:
    name: inventory-management-system
  
  # Database Configuration (MySQL)
  datasource:
    url: jdbc:mysql://localhost:3306/inventory_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
  # DISABLE Redis/Cache for testing
  cache:
    type: none
  
  # DISABLE Redis autoconfiguration
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  data:
    redis:
      enabled: false

# Server Configuration
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# Logging Configuration
logging:
  level:
    root: INFO
    com.inventoryapp: DEBUG

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Encryption Configuration
aes:
  encryption:
    key: Y2hhbmdlbWUxMjM0NTY3OA==

# JWT Configuration
jwt:
  secret: mySecretKeyForJWTTokenGenerationAndValidation12345
  expiration: 86400000  # 24 hours

# Rate Limiting Configuration (disabled in test profile - Redis not required)
rate-limiting:
  enabled: false
  requests-per-minute: 60
  per-tenant: true
  per-user: true

# Default Admin Configuration
app:
  admin:
    default-username: admin
    default-password: ChangeMe@123
    default-tenant: 0
